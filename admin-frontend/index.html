<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點名系統管理後台</title>
    <style>
        :root {
            --primary: #0071e3;
            --secondary: #86868b;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --secondary-text: #6e6e73;
            --success: #34c759;
            --warning: #ffcc00;
            --error: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #loginSection {
            max-width: 400px;
            margin: 100px auto 0;
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { color: var(--secondary-text); margin-bottom: 2rem; font-size: 14px; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--secondary-text); margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fbfbfd;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .primary-btn { background-color: var(--primary); color: white; }
        .primary-btn:hover { background-color: #0077ed; }
        .secondary-btn { background-color: #e8e8ed; color: var(--text); }
        .secondary-btn:hover { background-color: #d2d2d7; }
        .delete-btn { background: none; color: var(--error); width: auto; padding: 5px; font-size: 13px; margin: 0; }
        .text-btn { background: none; color: var(--primary); width: auto; padding: 0; font-size: 14px; margin: 0; }

        button:disabled { background-color: #d2d2d7; cursor: not-allowed; }

        .dashboard { padding-top: 2rem; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e8e8ed; }
        .logout-link { color: var(--primary); text-decoration: none; font-size: 14px; cursor: pointer; }

        .tabs { display: flex; gap: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid #d2d2d7; }
        .tab { padding: 10px 5px; cursor: pointer; font-weight: 500; color: var(--secondary-text); border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .admin-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 2rem; }
        .config-card { background: white; border: 1px solid #d2d2d7; border-radius: 15px; padding: 1.5rem; }
        .config-card h3 { margin-top: 0; font-size: 18px; margin-bottom: 1rem; }

        .table-container { margin-top: 1rem; overflow-x: auto; border: 1px solid #d2d2d7; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th { background: #f5f5f7; padding: 12px; font-weight: 600; border-bottom: 1px solid #d2d2d7; }
        td { padding: 12px; border-bottom: 1px solid #f5f5f7; vertical-align: middle; }
        
        .table-input { padding: 6px 10px !important; font-size: 13px !important; margin: 0; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .badge-admin { background: #e1f5fe; color: #01579b; }
        .badge-user { background: #f5f5f7; color: #666; }

        .status-msg { font-size: 13px; margin-top: 10px; }
        .status-msg.success { color: var(--success); }
        .status-msg.error { color: var(--error); }

        .preview-container { background: #f9f9fb; padding: 10px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 11px; white-space: pre; }

        /* Photo Library */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .photo-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #d2d2d7; transition: all 0.2s; position: relative; }
        .photo-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .photo-card-img { width: 100%; height: 160px; background: #f5f5f7; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .photo-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .photo-card-info { padding: 10px; border-top: 1px solid #f5f5f7; }
        .photo-card-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .photo-card-uid { font-size: 10px; color: var(--secondary-text); font-family: monospace; }
        .photo-card-actions { position: absolute; top: 5px; right: 5px; opacity: 0; transition: opacity 0.2s; }
        .photo-card:hover .photo-card-actions { opacity: 1; }
        .photo-action-btn { background: rgba(255,255,255,0.9); border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 12px; }
        .photo-action-btn.delete { color: var(--error); }

        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #settingsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .settings-icon { cursor: pointer; padding: 5px; border-radius: 50%; transition: background 0.2s; }
        .settings-icon:hover { background: #f5f5f7; }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div class="container" id="loginSection">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div style="flex: 1;">
                <h1>管理員登入</h1>
                <p class="subtitle">進入管理後台控制面板</p>
            </div>
            <div class="settings-icon" onclick="openSettings()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>
        <div class="form-group">
            <label>使用者名稱</label>
            <input type="text" id="username" placeholder="請輸入帳號">
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="請輸入密碼">
        </div>
        <button id="loginBtn" class="primary-btn" onclick="login()">登入</button>
        <p id="loginError" class="error"></p>
    </div>

    <!-- Dashboard Section -->
    <div class="container dashboard" id="dashboardSection" style="display: none;">
        <div class="user-info">
            <div>
                <span id="welcomeText" style="font-weight: 600;">您好，管理員</span>
                <div style="font-size: 12px; color: var(--secondary-text); margin-top: 2px;">系統管理控制面板</div>
            </div>
            <a class="logout-link" onclick="logout()">登出</a>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('export')">匯出記錄</div>
            <div class="tab" onclick="switchTab('temp-riders')">臨時搭乘</div>
            <div class="tab" onclick="switchTab('photos')">相片庫</div>
            <div class="tab" onclick="switchTab('config')">系統設定</div>
        </div>

        <!-- Tab: Export -->
        <div id="exportTab" class="tab-content active">
            <h1>匯出點名記錄</h1>
            <p class="subtitle">下載指定日期與時段的 CSV 報表</p>
            <div class="config-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="datePicker">
                    </div>
                    <div class="form-group">
                        <label>時段</label>
                        <select id="slotPicker">
                            <option value="07:00-09:00">早上 (07:00-09:00)</option>
                            <option value="16:00-18:00">下午 (16:00-18:00)</option>
                            <option value="19:00-21:00">晚上 (19:00-21:00)</option>
                            <option value="Not in time">其他 (不在時段內)</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; gap: 15px;">
                    <button id="downloadBtn" class="primary-btn" onclick="downloadCSV()">下載單日 CSV</button>
                    <button id="downloadWeekBtn" class="secondary-btn" onclick="downloadWeekCSV()">下載全週記錄 (一至五)</button>
                </div>
                <p id="downloadError" class="error"></p>
            </div>
        </div>

        <!-- Tab: Temporary Riders -->
        <div id="temp-ridersTab" class="tab-content">
            <h1>臨時搭乘管理</h1>
            <p class="subtitle">手動指派學生至特定行程</p>
            <div class="admin-cards">
                <div class="config-card">
                    <h3>新增臨時指派</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group"><label>日期</label><input type="date" id="temp-date" onchange="updateOccupancy()"></div>
                        <div class="form-group"><label>時段</label><select id="temp-slot" onchange="updateOccupancy()"></select></div>
                    </div>
                    <div class="form-group"><label>目標車輛</label><select id="temp-bus" onchange="updateOccupancy()"></select></div>
                    <div class="form-group">
                        <label>學生 UID (10 碼)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="temp-uid" placeholder="輸入 UID" oninput="lookupStudent()">
                            <button onclick="lookupStudent()" class="secondary-btn" style="width: auto; margin: 0; padding: 0 15px;">查詢</button>
                        </div>
                        <p id="temp-student-info" style="font-size: 12px; margin-top: 5px;"></p>
                    </div>
                    <div class="form-group"><label>學生姓名</label><input type="text" id="temp-name" placeholder="姓名"></div>
                    <div class="form-group"><label>學號 (選填)</label><input type="text" id="temp-badge" placeholder="學號"></div>
                    
                    <div id="occupancy-info" class="preview-container" style="display: none; margin-bottom: 15px; background: #e1f5fe; color: #01579b; border: none;">
                        <strong>車輛負載:</strong> <span id="occupancy-count">0 / 40</span>
                    </div>
                    <button id="add-temp-btn" class="primary-btn" onclick="addTemporaryRider()">新增指派</button>
                    <p id="status-temp" class="status-msg"></p>
                </div>
                <div class="config-card">
                    <h3>作用中臨時指派</h3>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>日期</th><th>時段</th><th>車次</th><th>學生</th><th>學號</th><th>UID</th><th>操作</th></tr></thead>
                            <tbody id="temp-riders-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Photo Library -->
        <div id="photosTab" class="tab-content">
            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 20px; align-items: flex-start; margin-bottom: 2rem;">
                <div>
                    <h1>相片庫</h1>
                    <p class="subtitle">查看與管理資料庫中的學生相片</p>
                    <input type="text" id="photo-search" placeholder="搜尋姓名、UID 或學號..." oninput="filterPhotos()" style="max-width: 400px;">
                </div>
                <div class="config-card" style="margin: 0; padding: 1.2rem; border-color: var(--primary);">
                    <h3 style="color: var(--primary);">相片上傳</h3>
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 11px; font-weight: 600;">單筆上傳</label>
                        <input type="text" id="photo-upload-uid" placeholder="輸入 UID" class="table-input" style="margin-bottom: 5px;">
                        <input type="file" id="photo-upload-file" accept=".jpg,.jpeg" style="font-size: 11px; margin-bottom: 5px;">
                        <button onclick="uploadStudentPhoto()" id="photo-upload-btn" class="secondary-btn" style="padding: 8px; font-size: 12px;">上傳至資料庫</button>
                    </div>
                    <div style="border-top: 1px solid #eee; padding-top: 15px;">
                        <label style="font-size: 11px; font-weight: 600;">批量上傳 (檔名需為學號)</label>
                        <input type="file" id="photo-bulk-input" multiple accept=".jpg,.jpeg" style="font-size: 11px; margin-bottom: 5px;">
                        <button onclick="uploadBulkPhotos()" id="bulk-upload-btn" class="primary-btn" style="padding: 8px; font-size: 12px;">開始批量上傳</button>
                    </div>
                    <div id="bulk-upload-status" class="status-msg" style="font-size: 11px; max-height: 80px; overflow-y: auto;"></div>
                    <p id="status-photo-upload" class="status-msg" style="font-size: 11px;"></p>
                </div>
            </div>
            <div id="photo-grid" class="photo-grid"></div>
        </div>

        <!-- Tab: Config -->
        <div id="configTab" class="tab-content">
            <h1>系統設定</h1>
            <p class="subtitle">管理帳號、時段與基礎名單資料</p>
            <div class="admin-cards">
                <!-- Accounts -->
                <div class="config-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0;">帳號管理</h3>
                        <button onclick="saveAccounts()" id="save-accounts-btn" class="secondary-btn" style="width: auto; margin: 0; padding: 8px 15px; font-size: 13px;">儲存帳號</button>
                    </div>
                    <div class="table-container" style="max-height: 300px;"><table id="accounts-table"><thead><tr><th>帳號</th><th>密碼</th><th>名稱</th><th>權限</th><th>操作</th></tr></thead><tbody id="accounts-body"></tbody>
                        <tfoot>
                            <tr style="background: #fbfbfd;">
                                <td><input type="text" id="new-account-username" placeholder="帳號" class="table-input"></td>
                                <td><input type="password" id="new-account-password" placeholder="密碼" class="table-input"></td>
                                <td><input type="text" id="new-account-name" placeholder="名稱" class="table-input"></td>
                                <td><select id="new-account-type" class="table-input"><option value="user">使用者</option><option value="admin">管理員</option></select></td>
                                <td><button onclick="addAccount()" class="text-btn">新增</button></td>
                            </tr>
                        </tfoot>
                    </table></div>
                </div>
                <!-- Slots -->
                <div class="config-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0;">時段配置</h3>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="resetToDefaults()" class="secondary-btn" style="width: auto; margin: 0; padding: 8px 15px; font-size: 13px;">重設預設</button>
                            <button onclick="saveSlots()" id="save-slots-btn" class="primary-btn" style="width: auto; margin: 0; padding: 8px 15px; font-size: 13px;">儲存配置</button>
                        </div>
                    </div>
                    <div class="table-container"><table id="slots-table"><thead><tr><th>日期</th><th>開始</th><th>結束</th><th>名單</th><th>名稱</th><th>類型</th><th>操作</th></tr></thead><tbody id="slots-body"></tbody>
                        <tfoot>
                            <tr style="background: #fbfbfd;">
                                <td><select id="new-slot-day" class="table-input"><option value="">每天</option><option value="group:1,2,3,4">一至四</option><option value="5">週五</option></select></td>
                                <td><input type="text" id="new-slot-start" placeholder="07:00" class="table-input"></td>
                                <td><input type="text" id="new-slot-end" placeholder="09:00" class="table-input"></td>
                                <td><select id="new-slot-csv" class="table-input"><option value="arrival">早上</option><option value="full_departure">下午</option></select></td>
                                <td><input type="text" id="new-slot-label" placeholder="名稱" class="table-input"></td>
                                <td><select id="new-slot-type" class="table-input"><option value="permanent">永久</option><option value="temp">臨時</option></select></td>
                                <td><button onclick="addSlot()" class="text-btn">新增</button></td>
                            </tr>
                        </tfoot>
                    </table></div>
                </div>
                <!-- Lists -->
                <div class="config-card" style="grid-column: 1 / -1;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <h3>學生名單上傳</h3>
                            <select id="student-list-type" class="table-input" style="margin-bottom: 10px;">
                                <option value="arrival">早上名單</option>
                                <option value="full_departure">下午名單</option>
                                <option value="night_class_afternoon">夜間下午</option>
                                <option value="night_class_night">夜間晚上</option>
                            </select>
                            <input type="file" id="file-students" accept=".csv" style="font-size: 12px;">
                            <div class="btn-group">
                                <button onclick="previewCSV('students')" class="secondary-btn" style="font-size: 13px; padding: 8px;">預覽</button>
                                <button id="upload-students" onclick="uploadConfig('students')" disabled class="primary-btn" style="font-size: 13px; padding: 8px;">上傳</button>
                            </div>
                            <div id="preview-students" class="preview-container" style="display:none"></div>
                            <p id="status-students" class="status-msg"></p>
                        </div>
                        <div>
                            <h3>車次名單上傳</h3>
                            <select id="bus-list-type" class="table-input" style="margin-bottom: 10px;">
                                <option value="arrival">早上名單</option>
                                <option value="full_departure">下午名單</option>
                            </select>
                            <input type="file" id="file-buses" accept=".csv" style="font-size: 12px;">
                            <div class="btn-group">
                                <button onclick="previewCSV('buses')" class="secondary-btn" style="font-size: 13px; padding: 8px;">預覽</button>
                                <button id="upload-buses" onclick="uploadConfig('buses')" disabled class="primary-btn" style="font-size: 13px; padding: 8px;">上傳</button>
                            </div>
                            <div id="preview-buses" class="preview-container" style="display:none"></div>
                            <p id="status-buses" class="status-msg"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal">
        <div class="modal-content">
            <h2>連線設定</h2>
            <div class="form-group">
                <label>API 基礎網址</label>
                <input type="text" id="apiUrlInput" placeholder="https://api.example.com">
            </div>
            <button onclick="saveSettings()" class="primary-btn">儲存並重新載入</button>
            <button onclick="testConnection()" class="secondary-btn">測試連線</button>
            <button onclick="document.getElementById('settingsModal').style.display='none'" class="secondary-btn" style="background: none;">取消</button>
            <p id="testStatus" class="status-msg"></p>
        </div>
    </div>

    <script>
        const AUTH_TOKEN = "secret-bus-token-2026";
        const BASE_URL = localStorage.getItem('apiUrl') || 
                        (location.hostname === 'localhost' || location.hostname === '127.0.0.1' ? 'http://localhost:5001' : 'https://bus-rollcall-api.vercel.app');

        let authToken = localStorage.getItem('adminToken') || '';
        let adminName = localStorage.getItem('adminName') || '管理員';
        let accounts = [];
        let slotConfigs = [];
        let defaultSlot = { csvType: 'arrival', label: '不在時段內' };
        let allPhotos = [];
        let allStudentsList = [];

        document.getElementById('datePicker').valueAsDate = new Date();

        if (authToken) { showDashboard(); }

        function openSettings() {
            document.getElementById('settingsModal').style.display = 'flex';
            document.getElementById('apiUrlInput').value = BASE_URL;
        }

        function saveSettings() {
            const url = document.getElementById('apiUrlInput').value.trim();
            if (url) { localStorage.setItem('apiUrl', url); location.reload(); }
        }

        async function testConnection() {
            const url = document.getElementById('apiUrlInput').value.trim() || BASE_URL;
            const status = document.getElementById('testStatus');
            status.textContent = '測試中...';
            try {
                const res = await fetch(`${url}/api/buses`, { headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` } });
                if (res.status === 401 || res.ok) { status.textContent = '連接成功！'; status.className = 'status-msg success'; }
                else { status.textContent = '連接失敗'; status.className = 'status-msg error'; }
            } catch (err) { status.textContent = '網路錯誤'; status.className = 'status-msg error'; }
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            if (!user || !pass) return;
            btn.disabled = true;
            try {
                const res = await fetch(`${BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminName', data.user.name);
                    authToken = data.token;
                    adminName = data.user.name;
                    showDashboard();
                } else { error.textContent = data.error || '登入失敗'; }
            } catch (err) { error.textContent = '網路錯誤'; }
            finally { btn.disabled = false; }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('welcomeText').textContent = `您好，${adminName}`;
            fetchAccounts();
            fetchSlots();
            fetchPhotos();
            fetchGlobalStudents();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            // Find tab header and content
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => {
                if(t.getAttribute('onclick').includes(`'${tabName}'`)) t.classList.add('active');
            });
            
            const targetContent = document.getElementById(`${tabName}Tab`);
            if(targetContent) targetContent.classList.add('active');

            if (tabName === 'temp-riders') { fetchTempRiders(); populateSelectors(); }
            if (tabName === 'photos') { fetchPhotos(); }
        }

        async function fetchAccounts() {
            try {
                const res = await fetch(`${BASE_URL}/api/admin/accounts`, { headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) { accounts = await res.json(); renderAccounts(); }
            } catch (err) { console.error(err); }
        }

        function renderAccounts() {
            const body = document.getElementById('accounts-body');
            body.innerHTML = '';
            accounts.forEach((acc, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${acc.username}</td>
                    <td>•••••••• <button class="text-btn" onclick="resetPassword(${index})">重設</button></td>
                    <td><input type="text" value="${acc.name}" onchange="accounts[${index}].name=this.value" class="table-input"></td>
                    <td><select onchange="accounts[${index}].type=this.value" class="table-input"><option value="user" ${acc.type==='user'?'selected':''}>使用者</option><option value="admin" ${acc.type==='admin'?'selected':''}>管理員</option></select></td>
                    <td><button class="delete-btn" onclick="accounts.splice(${index},1);renderAccounts()">刪除</button></td>
                `;
                body.appendChild(tr);
            });
        }

        function resetPassword(index) {
            const p = prompt(`請輸入 ${accounts[index].username} 的新密碼:`);
            if (p) { accounts[index].password = p; alert('密碼已修改，請記得儲存變更。'); }
        }

        function updateDefaultSlot() {
            defaultSlot.csvType = document.getElementById('default-slot-csv').value;
            defaultSlot.label = document.getElementById('default-slot-label').value;
        }

        function addAccount() {
            const userInp = document.getElementById('new-account-username');
            const passInp = document.getElementById('new-account-password');
            const nameInp = document.getElementById('new-account-name');
            const typeInp = document.getElementById('new-account-type');
            
            const username = userInp.value.trim();
            const password = passInp.value.trim();
            const name = nameInp.value.trim();
            const type = typeInp.value;

            if (!username || !password || !name) {
                alert('所有欄位皆為必填');
                return;
            }

            if (accounts.some(a => a.username === username)) {
                alert('使用者名稱已存在');
                return;
            }

            accounts.push({ username, password, name, type });
            renderAccounts();
            
            userInp.value = '';
            passInp.value = '';
            nameInp.value = '';
        }

        function addSlot() {
            const dayVal = document.getElementById('new-slot-day').value;
            const start = document.getElementById('new-slot-start').value.trim();
            const end = document.getElementById('new-slot-end').value.trim();
            const csvType = document.getElementById('new-slot-csv').value;
            const label = document.getElementById('new-slot-label').value.trim();
            const type = document.getElementById('new-slot-type').value;

            if (!start || !end || !label) {
                alert('開始時間、結束時間與名稱皆為必填');
                return;
            }

            const newSlot = { start, end, csvType, label, isTemp: type === 'temp' };
            
            if (dayVal.startsWith('group:')) {
                newSlot.days = dayVal.split(':')[1].split(',').map(Number);
            } else if (dayVal !== "") {
                newSlot.day = parseInt(dayVal);
            }

            slotConfigs.push(newSlot);
            renderSlots();

            document.getElementById('new-slot-start').value = '';
            document.getElementById('new-slot-end').value = '';
            document.getElementById('new-slot-label').value = '';
        }

        async function saveAccounts() {
            const status = document.getElementById('status-accounts');
            try {
                const res = await fetch(`${BASE_URL}/api/admin/config/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                    body: JSON.stringify(accounts)
                });
                if (res.ok) { status.textContent = '帳號已更新'; status.className = 'status-msg success'; }
            } catch (err) { status.textContent = '網路錯誤'; status.className = 'status-msg error'; }
        }

        async function fetchSlots() {
            try {
                const res = await fetch(`${BASE_URL}/api/admin/config/slots`, { headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) {
                    const data = await res.json();
                    slotConfigs = data.slots || [];
                    defaultSlot = data.default || defaultSlot;
                    document.getElementById('default-slot-csv').value = defaultSlot.csvType;
                    document.getElementById('default-slot-label').value = defaultSlot.label;
                    renderSlots();
                }
            } catch (err) { console.error(err); }
        }

        function renderSlots() {
            const body = document.getElementById('slots-body');
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            body.innerHTML = '';
            slotConfigs.forEach((s, i) => {
                let dText = '每天';
                if (s.day !== undefined) dText = `週${days[s.day]}`;
                else if (s.days) dText = s.days.map(d => days[d]).join(',');
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${dText}</td><td>${s.start}</td><td>${s.end}</td><td>${s.csvType}</td><td>${s.label}</td><td>${s.isTemp?'臨時':'永久'}</td><td><button class="delete-btn" onclick="slotConfigs.splice(${i},1);renderSlots()">刪除</button></td>`;
                body.appendChild(tr);
            });
        }

        async function saveSlots() {
            const status = document.getElementById('status-slots');
            try {
                const res = await fetch(`${BASE_URL}/api/admin/config/slots`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                    body: JSON.stringify({ slots: slotConfigs, default: defaultSlot })
                });
                if (res.ok) { status.textContent = '配置已儲存'; status.className = 'status-msg success'; }
            } catch (err) { status.textContent = '網路錯誤'; status.className = 'status-msg error'; }
        }

        function resetToDefaults() {
            if (confirm('確定要重設嗎？')) {
                slotConfigs = [
                    { start: "07:00", end: "09:00", csvType: "arrival", label: "早上" },
                    { day: 5, start: "16:00", end: "18:00", csvType: "full_departure", label: "週五下午" },
                    { days: [1, 2, 3, 4], start: "16:00", end: "18:00", csvType: "night_class_afternoon", label: "週一至四下午" },
                    { days: [1, 2, 3, 4], start: "19:00", end: "21:00", csvType: "night_class_night", label: "週一至四晚上" }
                ];
                renderSlots();
            }
        }

        async function fetchPhotos() {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await fetch(`${BASE_URL}/api/admin/photos`, { headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) { allPhotos = await res.json(); renderPhotos(allPhotos); }
            } catch (err) { grid.innerHTML = '載入失敗'; }
        }

        function renderPhotos(photos) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            photos.forEach(p => {
                const url = `${BASE_URL}/api/photo/${p.uid}?token=${authToken}&t=${Date.now()}`;
                const div = document.createElement('div');
                div.className = 'photo-card';
                div.innerHTML = `
                    <div class="photo-card-actions"><button class="photo-action-btn delete" onclick="deletePhoto('${p.uid}','${p.name}')">✕</button></div>
                    <div class="photo-card-img" onclick="window.open('${url}','_blank')"><img src="${url}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=random'"></div>
                    <div class="photo-card-info"><div class="photo-card-name">${p.name}</div><div class="photo-card-uid">${p.uid}</div></div>
                `;
                grid.appendChild(div);
            });
        }

        function filterPhotos() {
            const q = document.getElementById('photo-search').value.toLowerCase();
            renderPhotos(allPhotos.filter(p => p.name.toLowerCase().includes(q) || p.uid.includes(q) || (p.badge && p.badge.includes(q))));
        }

        async function deletePhoto(uid, name) {
            if (confirm(`確定要刪除 ${name} 的相片嗎？`)) {
                const res = await fetch(`${BASE_URL}/api/admin/student/photo/${uid}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) { allPhotos = allPhotos.filter(p => p.uid !== uid); renderPhotos(allPhotos); }
            }
        }

        async function uploadStudentPhoto() {
            const uid = document.getElementById('photo-upload-uid').value.trim();
            const file = document.getElementById('photo-upload-file').files[0];
            if (!uid || !file) return;
            const reader = new FileReader();
            reader.onload = async () => {
                const photo = reader.result.split(',')[1];
                const res = await fetch(`${BASE_URL}/api/admin/student/photo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                    body: JSON.stringify({ uid, photo })
                });
                if (res.ok) { alert('上傳成功'); fetchPhotos(); }
            };
            reader.readAsDataURL(file);
        }

        async function uploadBulkPhotos() {
            const files = document.getElementById('photo-bulk-input').files;
            const status = document.getElementById('bulk-upload-status');
            if (!files.length) return;
            status.textContent = `處理中... (0/${files.length})`;
            let count = 0;
            for (const f of files) {
                const badge = f.name.split('.')[0];
                const student = allStudentsList.find(s => s.badge === badge);
                if (student) {
                    const base64 = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(f); });
                    await fetch(`${BASE_URL}/api/admin/student/photo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                        body: JSON.stringify({ uid: student.uid, photo: base64 })
                    });
                    count++;
                }
                status.textContent = `處理中... (${count}/${files.length})`;
            }
            status.textContent = `上傳完成！共成功上傳 ${count} 張相片。`;
            fetchPhotos();
        }

        async function fetchGlobalStudents() {
            try {
                const res = await fetch(`${BASE_URL}/api/students`, { headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) allStudentsList = Object.values(await res.json());
            } catch (err) {}
        }

        async function fetchTempRiders() {
            try {
                const res = await fetch(`${BASE_URL}/api/admin/temporary-riders`, { headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) renderTempRiders(await res.json());
            } catch (err) {}
        }

        function renderTempRiders(riders) {
            const body = document.getElementById('temp-riders-body');
            body.innerHTML = '';
            const now = new Date();
            const taipei = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
            taipei.setHours(0,0,0,0);
            const cutoff = new Date(taipei);
            cutoff.setDate(cutoff.getDate() - 1);

            riders.filter(r => new Date(r.date) >= cutoff).sort((a,b) => b.date.localeCompare(a.date)).forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.date}</td><td>${r.timeSlot}</td><td>${r.bus}</td><td>${r.name}</td><td>${r.badge||'---'}</td><td>${r.uid}</td><td><button class="delete-btn" onclick="deleteTempRider('${r.id}')">刪除</button></td>`;
                body.appendChild(tr);
            });
        }

        async function deleteTempRider(id) {
            if (confirm('確定要刪除嗎？')) {
                await fetch(`${BASE_URL}/api/admin/temporary-riders/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${authToken}` } });
                fetchTempRiders();
            }
        }

        async function addTemporaryRider() {
            const date = document.getElementById('temp-date').value;
            const slot = document.getElementById('temp-slot').value;
            const bus = document.getElementById('temp-bus').value;
            const uid = document.getElementById('temp-uid').value.trim();
            const name = document.getElementById('temp-name').value.trim();
            const badge = document.getElementById('temp-badge').value.trim();
            if (!date || !slot || !bus || !uid || !name) return;
            const res = await fetch(`${BASE_URL}/api/admin/temporary-riders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify({ date, timeSlot: slot, bus, uid, name, badge })
            });
            if (res.ok) { fetchTempRiders(); document.getElementById('temp-uid').value = ''; document.getElementById('temp-name').value = ''; document.getElementById('temp-badge').value = ''; }
        }

        function populateSelectors() {
            const slots = ["07:00-09:00", "16:00-18:00", "19:00-21:00", "Not in time"];
            const sSelect = document.getElementById('temp-slot');
            sSelect.innerHTML = '';
            slots.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; sSelect.appendChild(opt); });
            fetchBusesForTemp();
        }

        async function fetchBusesForTemp() {
            const res = await fetch(`${BASE_URL}/api/buses`, { headers: { 'Authorization': `Bearer ${authToken}` } });
            const buses = await res.json();
            const bSelect = document.getElementById('temp-bus');
            bSelect.innerHTML = '<option value="">請選擇車次</option>';
            buses.forEach(b => { const name = typeof b === 'string' ? b : b.name; const opt = document.createElement('option'); opt.value = name; opt.textContent = name; bSelect.appendChild(opt); });
        }

        async function lookupStudent() {
            const uid = document.getElementById('temp-uid').value.trim();
            const info = document.getElementById('temp-student-info');
            if (!uid) return;
            try {
                const res = await fetch(`${BASE_URL}/api/student/${uid}`, { headers: { 'Authorization': `Bearer ${authToken}` } });
                if (res.ok) {
                    const s = await res.json();
                    info.textContent = `✅ 找到學生: ${s.name}`;
                    document.getElementById('temp-name').value = s.name;
                    document.getElementById('temp-badge').value = s.badge || '';
                } else { info.textContent = 'ℹ️ 新學生'; }
            } catch (err) {}
        }

        async function updateOccupancy() {
            const date = document.getElementById('temp-date').value;
            const slot = document.getElementById('temp-slot').value;
            const bus = document.getElementById('temp-bus').value;
            if (!date || !slot || !bus) return;
            const res = await fetch(`${BASE_URL}/api/admin/bus-occupancy?date=${date}&timeSlot=${encodeURIComponent(slot)}&bus=${encodeURIComponent(bus)}`, { headers: { 'Authorization': `Bearer ${authToken}` } });
            if (res.ok) {
                const data = await res.json();
                const box = document.getElementById('occupancy-info');
                box.style.display = 'block';
                document.getElementById('occupancy-count').textContent = `${data.count} / ${data.overflowLimit}`;
            }
        }

        async function previewCSV(type) {
            const file = document.getElementById(`file-${type}`).files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                document.getElementById(`preview-${type}`).style.display = 'block';
                document.getElementById(`preview-${type}`).textContent = lines.slice(0, 5).join('\n');
                document.getElementById(`upload-${type}`).disabled = false;
                parsedData[type] = e.target.result;
            };
            reader.readAsText(file);
        }

        async function uploadConfig(type) {
            const raw = parsedData[type];
            if (!raw) return;
            const lines = raw.split('\n').filter(l => l.trim());
            const headers = lines[0].split(',').map(h => h.trim().replace(/^\ufeff/, ''));
            const rows = lines.slice(1).map(l => {
                const values = l.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                let obj = {};
                headers.forEach((h, i) => obj[h] = values[i]);
                return obj;
            });
            const csvType = document.getElementById(`${type === 'students' ? 'student' : 'bus'}-list-type`).value;
            const payload = type === 'students' ? { students: rows, csvType } : { buses: rows.map(r => ({ name: r.bus || Object.values(r)[0], overflow: parseInt(r.overflow) || 40 })), csvType };
            await fetch(`${BASE_URL}/api/admin/config/${type}`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` }, body: JSON.stringify(payload) });
            alert('上傳成功'); location.reload();
        }

        async function downloadCSV() {
            const d = document.getElementById('datePicker').value;
            const s = document.getElementById('slotPicker').value;
            if (!d) return;
            const url = `${BASE_URL}/api/admin/rollcall-csv?date=${d}&timeSlot=${encodeURIComponent(s)}`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${authToken}` } });
            if (res.ok) {
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = `roll-call-${d}-${s}.csv`; a.click();
            }
        }

        async function downloadWeekCSV() {
            const dInput = document.getElementById('datePicker').value;
            if (!dInput) return;
            const date = new Date(dInput);
            const day = date.getDay();
            const diff = (day === 0 ? -6 : 1) - day;
            const mon = new Date(date); mon.setDate(date.getDate() + diff);
            const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
            const res = await fetch(`${BASE_URL}/api/admin/rollcall-week?startDate=${mon.toISOString().split('T')[0]}&endDate=${fri.toISOString().split('T')[0]}`, { headers: { 'Authorization': `Bearer ${authToken}` } });
            if (res.ok) {
                const data = await res.json();
                for (const name in data.files) {
                    const blob = new Blob([data.files[name]], { type: 'text/csv;charset=utf-8;' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob); a.download = name; a.click();
                    await new Promise(r => setTimeout(r, 300));
                }
            }
        }

        function updateDefaultSlot() {
            defaultSlot.csvType = document.getElementById('default-slot-csv').value;
            defaultSlot.label = document.getElementById('default-slot-label').value;
        }
    </script>
</body>
</html>
